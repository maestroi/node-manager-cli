name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to attach assets to
        required: true
        default: v0.8.0

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Resolve release tag
      id: release
      run: |
        if [ -n "${{ github.event.release.tag_name }}" ]; then
          echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
        else
          echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
        fi

    - name: Build binary
      run: |
        go build -ldflags "-X node-manager-cli/config.CLIVersion=${{ steps.release.outputs.tag }}" -o node-manager-cli
        tar -czvf node-manager-cli.tar.gz node-manager-cli

    - name: Upload release assets
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.release.outputs.tag }}
        files: |
          node-manager-cli
          node-manager-cli.tar.gz
      env:
        GITHUB_TOKEN: ${{ github.token }}
